version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: attendance_db
    restart: always
    env_file:
      - .env
    ports:
      - "5430:5430"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: attendance_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  pgdata: